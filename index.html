<!DOCTYPE html>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* 🔥 GLOBAL FIX (no white flash) */
html, body {
  margin: 0;
  padding: 0;
  background: #020617;
  font-family: 'Poppins', sans-serif;
  color: #e2e8f0;
  text-align: center;
}

/* ================= LOADER ================= */
#loader{
  position: fixed;
  inset: 0;
  background: #020617;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.loader-box{
  width: 80%;
  max-width: 300px;
}

.loader-text{
  font-family: 'Orbitron', sans-serif;
  color: #00f5ff;
  font-size: 14px;
  margin-bottom: 15px;
  letter-spacing: 2px;
}

.bar{
  width: 100%;
  height: 10px;
  background: #111827;
  border-radius: 50px;
  overflow: hidden;
}

.progress{
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #00f5ff, #0ea5e9);
  animation: load 2s ease forwards;
}

@keyframes load{
  from {width: 0%;}
  to {width: 100%;}
}

/* ================= HEADER ================= */
header {
  padding: 20px;
  font-family: 'Orbitron', sans-serif;
  font-size: 28px;
  color: #00f5ff;
  text-shadow: 0 0 15px #00f5ff;
  border-bottom: 2px solid #00f5ff;
}

.logo {
  font-size: 55px;
  margin: 15px 0;
}

/* ================= CARD ================= */
.card {
  background: rgba(0, 245, 255, 0.05);
  border: 1px solid rgba(0, 245, 255, 0.2);
  margin: 20px auto;
  padding: 25px;
  max-width: 500px;
  border-radius: 15px;
}

.card h2 {
  font-family: 'Orbitron', sans-serif;
  font-size: 20px;
}

/* ================= BUTTON ================= */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: linear-gradient(45deg, #00f5ff, #0ea5e9);
  border: none;
  color: black;
  border-radius: 8px;
  font-weight: 600;
  font-size: 15px;
  cursor: pointer;

  /* 🔥 TOUCH + SMOOTH EFFECT */
  transition: transform 0.15s ease, box-shadow 0.2s ease;
  -webkit-tap-highlight-color: transparent;
}

/* hover effect */
button:hover {
  transform: scale(1.03);
  box-shadow: 0 0 15px #00f5ff;
}

/* touch/click effect */
button:active {
  transform: scale(0.96);
  box-shadow: 0 0 20px #00f5ff;
}

/* ================= POPUP ================= */
.popup {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  justify-content: center;
  align-items: center;
}

.popup.show {
  display: flex;
}

.popup-box {
  background: #111827;
  width: 90%;
  max-width: 350px;
  padding: 25px;
  border-radius: 12px;
  text-align: center;
  color: white;
}

.popup-box h2 {
  font-family: 'Orbitron', sans-serif;
  font-size: 22px;
}

.popup-box p {
  font-size: 15px;
}

/* FOOTER */
footer {
  margin-top: 30px;
  padding: 15px;
  font-size: 13px;
  opacity: 0.7;
}

/* MOBILE */
@media (max-width:480px){
  header {font-size:22px;}
  .logo {font-size:45px;}
  .card h2 {font-size:17px;}
}

</style>
</head>

<body>

<!-- 🔥 LOADING SCREEN -->
<div id="loader">

</div>

<header>💫 MINHAJ ☆ EDITZ 💫</header>

<div class="logo">🔥🔥🔥</div>

<div class="card">

<!-- POPUP -->
<div id="popup" class="popup">

</div>

<script>

let link="";

/* OPEN POPUP */
function openPopup(name,pass,dl){
  document.getElementById("popup").classList.add("show");
  document.getElementById("title").innerText=name;
  document.getElementById("passBox").innerText=pass;
  link=dl;
}

/* CLOSE POPUP */
function closePopup(){
  document.getElementById("popup").classList.remove("show");
}

/* DOWNLOAD */
function goDownload(){
  window.open(link,"_blank");
}

/* REMOVE LOADER */
window.addEventListener("load",()=>{
  setTimeout(()=>{
    document.getElementById("loader").style.display="none";
  }, 2000);
});

</script>

</html>
