<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GAMING MINHAJ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #020617, #0f172a);
  color: #e2e8f0;
  text-align: center;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* PARTICLES */
#particles {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
}

/* HEADER */
header {
  padding: 20px;
  font-family: 'Orbitron', sans-serif;
  font-size: 28px;
  color: #00f5ff;
  text-shadow: 0 0 10px #00f5ff;
  border-bottom: 2px solid #00f5ff;
}

/* LOGO */
.logo {
  font-size: 50px;
  margin: 10px 0;
  text-shadow: 0 0 20px #00f5ff;
}

/* CARD */
.card {
  background: rgba(0, 245, 255, 0.05);
  border: 1px solid rgba(0, 245, 255, 0.2);
  margin: 20px auto;
  padding: 25px;
  max-width: 500px;
  border-radius: 15px;

  transform: translateZ(0);
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: linear-gradient(45deg, #00f5ff, #0ea5e9);
  border: none;
  color: black;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.25s ease;
}

button:hover {
  transform: scale(1.04);
  box-shadow: 0 0 12px #00f5ff;
}

/* SMOOTH FADE */
.fade {
  opacity: 0;
  transform: translateY(25px);
  transition: all 0.6s ease;
  will-change: transform, opacity;
}

.fade.show {
  opacity: 1;
  transform: translateY(0);
}

/* POPUP */
.popup {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
}

.popup-box {
  background: #111827;
  width: 90%;
  max-width: 350px;
  margin: 120px auto;
  padding: 20px;
  border-radius: 12px;
  text-align: left;
  color: white;
  animation: pop 0.25s ease;
}

@keyframes pop {
  from {transform: scale(0.85); opacity: 0;}
  to {transform: scale(1); opacity: 1;}
}

footer {
  margin-top: 30px;
  padding: 15px;
  background: #020617;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<header>💫MINHAJ☆EDITZ💫</header>

<div class="logo">🔥🔥🔥</div>

<div class="card fade">
  <h2>Welcome Gamer 😎</h2>
</div>

<div class="card fade">
  <h2>👇👇Download Link👇👇</h2>

  <button onclick="openPopup('Config File','No','https://www.mediafire.com/file/aaif3qlhx2hdret/VIP+VISIT+BOT+GROUP+1.0.0_1.apk/file')">
    📥 FF Profile Visit Bot
  </button>

</div>

<div class="card fade">
  <h2>FOLLOW</h2>

  <button onclick="window.open('https://www.facebook.com/share/16jbNHUaaL/')">📘 Facebook</button>
  <button onclick="window.open('https://youtube.com/@gaming_minhaj_ff?si=qyyAM2Xa-ow4T6qm')">▶️ YouTube</button>
  <button onclick="window.open('https://t.me/mdminhajafrad1')">📢 Telegram</button>
</div>

<footer>© 2026 MINHAJ AFRAD</footer>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-box">

    <h2 id="title"></h2>
    <p>🔐 Password: <b id="pass"></b></p>

    <button onclick="goDownload()">⬇️ Download Now</button>
    <button onclick="closePopup()" style="background:red;color:white;">Close</button>

  </div>
</div>

<script>

/* POPUP */
let link="";

function openPopup(name,pass,dl){
  document.getElementById("popup").style.display="block";
  document.getElementById("title").innerText=name;
  document.getElementById("pass").innerText=pass;
  link=dl;
}

function closePopup(){
  document.getElementById("popup").style.display="none";
}

function goDownload(){
  window.open(link,"_blank");
}

/* SMOOTH SCROLL (NO LAG FIX) */
const items=document.querySelectorAll(".fade");

function checkFade(){
  const trigger=window.innerHeight*0.9;

  items.forEach(i=>{
    if(i.getBoundingClientRect().top<trigger){
      i.classList.add("show");
    }
  });
}

window.addEventListener("scroll",()=>{
  requestAnimationFrame(checkFade);
});

window.addEventListener("load",checkFade);

/* PARTICLES (OPTIMIZED) */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<40;i++){   // optimized (was 80)
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*1.5,
    dx:(Math.random()-0.5)*0.3,
    dy:(Math.random()-0.5)*0.3
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="#00f5ff";

  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();

    p.x+=p.dx;
    p.y+=p.dy;

    if(p.x<0||p.x>canvas.width)p.dx*=-1;
    if(p.y<0||p.y>canvas.height)p.dy*=-1;
  });

  requestAnimationFrame(animate);
}

animate();

/* RESIZE FIX */
window.addEventListener("resize",()=>{
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
});

</script>

</body>
</html>
