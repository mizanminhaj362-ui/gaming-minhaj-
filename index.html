<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GAMING MINHAJ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* 🌌 GLOBAL */
html, body {
  margin: 0;
  padding: 0;
  background: #020617;
  font-family: 'Poppins', sans-serif;
  color: #e2e8f0;
  text-align: center;
  font-size: clamp(14px, 2vw, 18px);
}

/* 🎮 GLOW CONTROL SYSTEM */
:root{
  --glow: 22px;
  --glow-spread: 4px;
}

/* LOADER */
#loader{
  position: fixed;
  inset: 0;
  background: #020617;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.loader-box{width:80%;max-width:300px;}

.loader-text{
  font-family:'Orbitron',sans-serif;
  color:#00f5ff;
  font-size:14px;
  margin-bottom:15px;
  letter-spacing:2px;
}

.bar{
  width:100%;
  height:10px;
  background:#111827;
  border-radius:50px;
  overflow:hidden;
}

.progress{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00f5ff,#0ea5e9);
  animation:load 2s ease forwards;
}

@keyframes load{
  from{width:0%}
  to{width:100%}
}

/* HEADER */
header{
  padding:20px;
  font-family:'Orbitron',sans-serif;
  font-size: clamp(20px, 4vw, 32px);
  color:#00f5ff;
  text-shadow:0 0 15px #00f5ff;
  border-bottom:2px solid #00f5ff;
}

/* LOGO */
.logo{
  font-size: clamp(40px, 10vw, 70px);
  margin:15px 0;
}

/* CARD */
.card{
  background:rgba(0,245,255,0.05);
  border:1px solid rgba(0,245,255,0.2);
  margin:20px auto;
  padding:25px;
  max-width:500px;
  border-radius:15px;
}

/* FADE */
header, .card, .logo{
  opacity: 0;
  transform: translateY(20px);
}

.show-ui header,
.show-ui .logo,
.show-ui .card{
  animation: fadeUp 0.5s ease forwards;
}

@keyframes fadeUp{
  to{
    opacity:1;
    transform: translateY(0);
  }
}

/* 🔘 BUTTON BASE */
button{
  width:100%;
  padding: clamp(10px, 2.5vw, 14px);
  margin-top:10px;

  border:none;
  border-radius:10px;
  font-weight:600;

  font-size: clamp(13px, 2.5vw, 16px);
  cursor:pointer;
  color:white;

  position: relative;
  overflow:hidden;

  opacity:0;
  transform: translateY(15px);
  transition: all 0.25s ease;
}

/* ANIMATION */
.show-ui button{
  animation: fadeBtn 0.35s ease forwards;
}

@keyframes fadeBtn{
  to{
    opacity:1;
    transform: translateY(0);
  }
}

/* CLICK */
button:active{
  transform: scale(0.95);
  filter: brightness(1.2);
}

/* 🌟 DEFAULT BUTTON */
button:not(.fb):not(.yt):not(.tg):not(.close-btn):not(.setup-btn){
  background:linear-gradient(45deg,#00f5ff,#0ea5e9);
  color:black;
  box-shadow:0 0 var(--glow) var(--glow-spread) rgba(0,245,255,0.6);
}

/* FACEBOOK */
.fb{
  background:#1877F2;
  box-shadow:0 0 var(--glow) var(--glow-spread) rgba(24,119,242,0.6);
}

/* YOUTUBE */
.yt{
  background:#FF0000;
  box-shadow:0 0 var(--glow) var(--glow-spread) rgba(255,0,0,0.6);
}

/* TELEGRAM */
.tg{
  background:#0088cc;
  box-shadow:0 0 var(--glow) var(--glow-spread) rgba(0,136,204,0.6);
}

/* SETUP */
.setup-btn{
  background:linear-gradient(45deg,#a855f7,#6366f1);
  box-shadow:0 0 var(--glow) var(--glow-spread) rgba(99,102,241,0.6);
}

/* CLOSE */
.close-btn{
  background:red;
  box-shadow:0 0 var(--glow) var(--glow-spread) rgba(255,0,0,0.6);
}

/* 🌈 HOVER GLOW */
button:hover{
  transform:scale(1.05);
  filter:brightness(1.2);
  box-shadow:0 0 40px 10px rgba(0,245,255,0.8);
}

/* POPUP */
.popup{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
  z-index:1000;
}

.popup.show{display:flex;}

.popup-box{
  background:#111827;
  width:90%;
  max-width:350px;
  padding:25px;
  border-radius:12px;
}

footer{
  margin-top:30px;
  padding:15px;
  font-size:13px;
  opacity:0.7;
}

</style>
</head>

<body>

<div id="loader">
  <div class="loader-box">
    <div class="loader-text">LOADING GAMING MINHAJ...</div>
    <div class="bar"><div class="progress"></div></div>
  </div>
</div>

<header>💫 MINHAJ ☆ EDITZ 💫</header>

<div class="logo">🔥🔥🔥</div>

<div class="card">
  <h2>Hi I'm Minhaj Afrad ! Follow Me 😎</h2>
</div>

<div class="card">
  <h2>👇👇 Download Link 👇👇</h2>

  <button onclick="openPopup('FF Like+Visitor Bot','No','https://www.mediafire.com/file/aaif3qlhx2hdret/file.apk')">
    📥 FF Like+Visitor Bot
  </button>
</div>

<div class="card">
  <h2>📢 FOLLOW MY OTHERS MEDIA</h2>

  <button class="fb" onclick="window.open('https://facebook.com')">Facebook</button>
  <button class="yt" onclick="window.open('https://youtube.com')">YouTube</button>
  <button class="tg" onclick="window.open('https://t.me')">Telegram</button>

</div>

<footer>© 2026 MINHAJ AFRAD</footer>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-box">

    <h2 id="title"></h2>
    <p>🔐 Password: <b id="passBox"></b></p>

      <button onclick="goDownload()">⬇️ DOWNLOAD</button>
    <button class="setup-btn" onclick="window.open('https://google.com')">🎬 SET-UP</button>
    <button class="close-btn" onclick="closePopup()">CLOSE</button>

  </div>
</div>

<script>

let link="";

function openPopup(name,pass,dl){
  document.getElementById("popup").classList.add("show");
  document.getElementById("title").innerText=name;
  document.getElementById("passBox").innerText=pass;
  link=dl;
}

function closePopup(){
  document.getElementById("popup").classList.remove("show");
}

function goDownload(){
  window.open(link,"_blank");
}

/* LOADER */
window.addEventListener("load",()=>{
  setTimeout(()=>{
    document.getElementById("loader").style.display="none";
    document.body.classList.add("show-ui");
  },2000);
});

</script>

</body>
</html>
