<style>

/* ================= GLOBAL AUTO TEXT SYSTEM ================= */
body {
  margin: 0;
  padding: 0;
  background: #020617;
  font-family: 'Poppins', sans-serif;
  color: #e2e8f0;
  text-align: center;
  font-size: clamp(14px, 1.8vw, 18px);

/* HEADINGS AUTO SCALE */

h2 { font-size: clamp(16px, 3.5vw, 24px); }
h3 { font-size: clamp(14px, 3vw, 20px); }

/* ================= LOADER ================= */
#loader{

  inset: 0;

.loader-box{width:80%;max-width:300px;}

  letter-spacing:2px;
}

.bar{
  width:100%;
  height:10px;
  background:#111827;
  border-radius:50px;
  overflow:hidden;
}

.progress{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00f5ff,#0ea5e9);
  animation:load 2s ease forwards;
}

@keyframes load{from{width:0%}to{width:100%}}

/* ================= HEADER ================= */
header{
  padding:20px;
  font-family:'Orbitron',sans-serif;
  font-size: clamp(18px, 4vw, 28px);
  color:#00f5ff;
  text-shadow:0 0 15px #00f5ff;
  border-bottom:2px solid #00f5ff;
}

/* ================= LOGO ================= */
.logo{
  font-size: clamp(35px, 9vw, 55px);
  margin:15px 0;
}

/* ================= CARD ================= */
.card{
  background:rgba(0,245,255,0.05);
  border:1px solid rgba(0,245,255,0.2);
  margin:20px auto;
  padding:25px;
  max-width:500px;
  border-radius:15px;
}

.card h2{
  font-size: clamp(14px, 2.8vw, 20px);
  line-height: 1.4;
}

/* ================= BUTTON ================= */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:linear-gradient(45deg,#00f5ff,#0ea5e9);
  border:none;
  color:black;
  border-radius:8px;
  font-weight:600;
  font-size: clamp(12px, 2.5vw, 15px);
  cursor:pointer;
  transition:0.15s;
  -webkit-tap-highlight-color:transparent;
}

button:active{transform:scale(0.96);}

/* ================= POPUP ================= */
.popup{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.popup.show{display:flex;}

.popup-box{
  background:#111827;
  width:90%;
  max-width:350px;
  padding:25px;
  border-radius:12px;
  text-align:center;
}

.popup-box h2{
  font-family:'Orbitron',sans-serif;
  font-size: clamp(16px, 3.2vw, 22px);
}

/* ================= FOOTER ================= */
footer{
  margin-top:30px;
  padding:15px;
  font-size: clamp(11px, 2vw, 13px);
  opacity:0.7;
}

</style>
</head>
